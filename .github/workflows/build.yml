name: Build geoip.dat (manual)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Clone geoip tool
      run: git clone https://github.com/v2fly/geoip.git

    - name: Prepare CDN IP data
      run: |
        mkdir -p geoip/data

        # 合并所有 txt
        cat data/*.txt > geoip/data/cdnip.txt

        # 去重
        sort -u geoip/data/cdnip.txt -o geoip/data/cdnip.txt

    - name: Write config.json
      run: |
        cat > geoip/config.json <<EOF
        {
          "input": [
            {
              "type": "text",
              "action": "add",
              "name": "cdnip",
              "inputDir": "data"
            }
          ],
          "output": "geoip.dat"
        }
        EOF

    - name: Build geoip.dat
      run: |
        cd geoip
        go mod download
        go run .

    - name: Upload geoip.dat
      uses: actions/upload-artifact@v4
      with:
        name: geoip
        path: geoip/geoip.dat
