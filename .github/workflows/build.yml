name: Build geoip.dat (stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt update
        sudo apt install -y wget tar

    - name: Download sing-box geoip builder
      run: |
        mkdir -p sb
        wget -O sb/sing-box.tar.gz \
        https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-linux-amd64.tar.gz

        tar -xzf sb/sing-box.tar.gz -C sb

    - name: Prepare CDN IP
      run: |
        mkdir -p data

        # 合并你的 CDN IP
        cat data/*.txt > data/cdnip.txt
        sort -u data/cdnip.txt -o data/cdnip.txt

    - name: Generate geoip.dat (STABLE WAY)
      run: |
        mkdir -p out

        # ⚠️ sing-box 方式：直接生成 geoip
        sb/sing-box geoip convert \
          --input data/cdnip.txt \
          --output out/geoip.dat \
          --code cdnip

    - name: Upload result
      uses: actions/upload-artifact@v4
      with:
        name: geoip
        path: out/geoip.dat
