name: Build Custom GeoIP DAT (Merged)

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'data/**/*.txt'
  workflow_dispatch:

# ==========================================================
# 在这里修改文件名（只需改这一处，后面会自动同步）
# ==========================================================
env:
  DAT_FILENAME: gcdn.dat
# ==========================================================

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install v2fly/geoip compiler
        run: |
          go install github.com/v2fly/geoip@latest

      - name: Merge and Clean TXT files
        run: |
          # 初始化合并文件
          > merged_cdnip.txt
          shopt -s nullglob
          for file in data/*.txt; do
            if [ -f "$file" ]; then
              cat "$file" >> merged_cdnip.txt
              echo "" >> merged_cdnip.txt
            fi
          done
          
          # 清洗数据：处理 Windows 换行符、首尾空格、空行
          sed -i 's/\r//g' merged_cdnip.txt
          sed -i 's/^[ \t]*//;s/[ \t]*$//' merged_cdnip.txt
          sed -i '/^[[:space:]]*$/d' merged_cdnip.txt
          
          echo "==== 合并后的 IP 预览 (前10行) ===="
          head -n 10 merged_cdnip.txt

      - name: Generate config.json
        run: |
          cat <<EOF > config.json
          {
            "input": [
              {
                "type": "text",
                "action": "add",
                "args": {
                  "name": "cdnip",
                  "uri": "./merged_cdnip.txt"
                }
              }
            ],
            "output": [
              {
                "type": "v2rayGeoIPDat",
                "action": "output"
              }
            ]
          }
          EOF

      - name: Compile Custom GeoIP.dat
        run: |
          # 运行编译工具
          $(go env GOPATH)/bin/geoip -c config.json
          
          # 自动寻找编译出的文件并重命名为你在顶部定义的变量名
          find output -type f -name "*.dat" -exec mv {} ./${{ env.DAT_FILENAME }} \;
          
          echo "编译完成，生成文件: ./${{ env.DAT_FILENAME }}"

      - name: Generate Release Tag
        id: tag
        run: echo "release_tag=$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.release_tag }}
          name: "Custom IP DAT - ${{ env.release_tag }}"
          # 这里自动引用顶部定义的文件名
          files: ./${{ env.DAT_FILENAME }}
          draft: false
          prerelease: false
