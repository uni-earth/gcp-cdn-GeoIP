name: Build geoip.dat

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Clone geoip tool
      run: git clone https://github.com/v2fly/geoip.git

    - name: Prepare CDN IP list
      run: |
        mkdir -p geoip/data

        # 合并你的 CDN IP
        cat data/*.txt > geoip/data/cdnip.txt

        # 去重（非常重要）
        sort -u geoip/data/cdnip.txt -o geoip/data/cdnip.txt

    - name: Build geoip.dat (NO CONFIG)
      run: |
        cd geoip

        go mod download

        # ⚠️ 关键：直接执行，不用 config.json
        go run ./...
